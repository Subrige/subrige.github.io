<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow" />
    <meta http-equiv="refresh" content="0; url=/ap-public-tracker/" />
    <title>Redirecting</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #050505;
        color: #f5f5f5;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        max-width: 520px;
        padding: 32px 24px;
        text-align: center;
      }

      a {
        color: #99dd3b;
        text-underline-offset: 4px;
      }

      p {
        margin: 0;
        line-height: 1.6;
      }
    </style>
    <script>
      window.location.replace('/ap-public-tracker/');
    </script>
  </head>
  <body>
    <main>
      <p>Redirecting to the public tracker preview. If you are not redirected, <a href="/ap-public-tracker/">open it here</a>.</p>
    </main>
  </body>
</html>
